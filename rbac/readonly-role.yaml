# ================================================
# RBAC - Read Only Role Configuration
# ================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: security-readonly-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: security-readonly-binding
subjects:
  - kind: User
    name: readonly-user@yourdomain.com
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: security-readonly-role
  apiGroup: rbac.authorization.k8s.io